<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>欧加真智能调光</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #f6f6f6;
      color: #111;
      font-family: "Microsoft YaHei UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    p {
      margin: 0 0 10px;
    }
    .row {
      margin-bottom: 10px;
    }
    .label {
      display: inline-block;
      min-width: 92px;
      color: #666;
    }
    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #bbb;
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      background: #fff;
      color: #111;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: monospace;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      background: #1677ff;
      color: #fff;
      font: inherit;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    button.secondary {
      background: #666;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .notice {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #e8f3ff;
      color: #0b4ea2;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .notice.error {
      background: #ffecec;
      color: #b42318;
    }
    .muted {
      color: #666;
    }
    .apps {
      max-height: 360px;
      overflow: auto;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px;
      background: #fafafa;
    }
    .app-item {
      display: block;
      padding: 6px 4px;
      border-bottom: 1px solid #eee;
      word-break: break-all;
    }
    .app-item:last-child {
      border-bottom: 0;
    }
    .log {
      min-height: 160px;
      background: #111;
      color: #d7ffd7;
      border-radius: 8px;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: monospace;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>欧加真智能调光</h1>
      <p>这是兼容性优先的极简 WebUI。先确认页面能正常显示，再继续加功能。</p>
      <div class="row"><span class="label">服务状态</span><span id="serviceState">读取中</span></div>
      <div class="row"><span class="label">当前模式</span><span id="currentState">读取中</span></div>
      <div class="row"><span class="label">前台应用</span><span id="topPackage">读取中</span></div>
      <div class="row"><span class="label">调试日志</span><span id="debugState">读取中</span></div>
      <div class="row"><span class="label">日志路径</span><span id="logPath" class="muted">读取中</span></div>
      <button id="refreshStateBtn" type="button">刷新状态</button>
      <button id="loadAppsBtn" class="secondary" type="button">加载第三方应用</button>
      <button id="readLogBtn" class="secondary" type="button">读取日志</button>
      <div id="notice" class="notice"></div>
    </div>

    <div class="card">
      <h2>应用名单</h2>
      <p class="muted">只加载第三方应用，不自动首屏扫描。勾选后点保存即可。</p>
      <div class="row">
        <input id="searchInput" type="text" placeholder="搜索包名">
      </div>
      <div id="appsList" class="apps">尚未加载应用列表。</div>
      <div class="row" style="margin-top:12px;">
        <textarea id="manualPackages" placeholder="每行一个包名，例如：&#10;com.example.app"></textarea>
      </div>
      <button id="saveBtn" type="button">保存并立即生效</button>
      <button id="reloadBtn" class="secondary" type="button">仅刷新配置显示</button>
    </div>

    <div class="card">
      <h2>调试</h2>
      <div class="row">
        <label><input id="debugToggle" type="checkbox"> 开启调试日志</label>
      </div>
      <div class="row">
        <span class="label">刷新间隔</span>
        <input id="refreshIntervalInput" type="number" min="1" max="10" step="1" value="8">
      </div>
      <button id="saveRefreshBtn" type="button">保存刷新间隔</button>
      <button id="clearLogBtn" class="secondary" type="button">清空日志</button>
      <div id="logView" class="log">尚未读取日志。</div>
    </div>
  </div>

  <script type="module">
    import {
      exec,
      getPackagesInfo,
      listPackages,
      moduleInfo,
      toast
    } from "./lib/kernelsu.js";

    let info = {};
    try {
      info = moduleInfo() || {};
    } catch (error) {
      info = {};
    }
    const MODULE_ID = info.id || info.moduleId || "oplus_smart_dimming";
    const SCRIPT_BASE = "/data/adb/modules/" + MODULE_ID + "/scripts";

    const appState = {
      apps: [],
      selectedMap: {},
      filter: "",
      debugEnabled: false,
      refreshInterval: 8,
      timerId: 0
    };

    const els = {
      serviceState: document.getElementById("serviceState"),
      currentState: document.getElementById("currentState"),
      topPackage: document.getElementById("topPackage"),
      debugState: document.getElementById("debugState"),
      logPath: document.getElementById("logPath"),
      notice: document.getElementById("notice"),
      searchInput: document.getElementById("searchInput"),
      appsList: document.getElementById("appsList"),
      manualPackages: document.getElementById("manualPackages"),
      saveBtn: document.getElementById("saveBtn"),
      reloadBtn: document.getElementById("reloadBtn"),
      refreshStateBtn: document.getElementById("refreshStateBtn"),
      loadAppsBtn: document.getElementById("loadAppsBtn"),
      readLogBtn: document.getElementById("readLogBtn"),
      clearLogBtn: document.getElementById("clearLogBtn"),
      logView: document.getElementById("logView"),
      debugToggle: document.getElementById("debugToggle"),
      refreshIntervalInput: document.getElementById("refreshIntervalInput"),
      saveRefreshBtn: document.getElementById("saveRefreshBtn")
    };

    function setNotice(message, isError) {
      els.notice.style.display = message ? "block" : "none";
      els.notice.className = "notice" + (isError ? " error" : "");
      els.notice.textContent = message || "";
    }

    function setBusy(disabled) {
      els.saveBtn.disabled = disabled;
      els.reloadBtn.disabled = disabled;
      els.refreshStateBtn.disabled = disabled;
      els.loadAppsBtn.disabled = disabled;
      els.readLogBtn.disabled = disabled;
      els.clearLogBtn.disabled = disabled;
      els.debugToggle.disabled = disabled;
      els.refreshIntervalInput.disabled = disabled;
      els.saveRefreshBtn.disabled = disabled;
    }

    function shellQuote(text) {
      return "'" + String(text).replace(/'/g, "'\\''") + "'";
    }

    async function execCommand(command, options) {
      return exec(command, options);
    }

    function parseKeyValue(text) {
      const map = {};
      const lines = String(text || "").split(/\r?\n/);
      let i;
      for (i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        const index = line.indexOf("=");
        if (index > 0) {
          map[line.slice(0, index)] = line.slice(index + 1);
        }
      }
      return map;
    }

    function parsePackages(text) {
      const map = {};
      const result = [];
      const lines = String(text || "").split(/\r?\n/);
      let i;
      for (i = 0; i < lines.length; i += 1) {
        const line = lines[i].replace(/^\s+|\s+$/g, "");
        if (!/^[A-Za-z0-9_]+(\.[A-Za-z0-9_]+)+$/.test(line)) {
          continue;
        }
        if (!map[line]) {
          map[line] = true;
          result.push(line);
        }
      }
      result.sort();
      return result;
    }

    function normalizeInterval(value) {
      const parsed = parseInt(value, 10);
      if (!parsed || parsed < 1) {
        return 8;
      }
      if (parsed > 10) {
        return 10;
      }
      return parsed;
    }

    function applyState(stateData) {
      els.serviceState.textContent = stateData.service || "未知";
      els.currentState.textContent = stateData.state || "未知";
      els.topPackage.textContent = stateData.top || "无";
      appState.debugEnabled = stateData.debug === "1";
      appState.refreshInterval = normalizeInterval(stateData.refresh || appState.refreshInterval);
      els.debugState.textContent = appState.debugEnabled ? "开启" : "关闭";
      els.debugToggle.checked = appState.debugEnabled;
      els.logPath.textContent = stateData.log || "未知";
      els.refreshIntervalInput.value = String(appState.refreshInterval);
      restartTimer();
    }

    function loadRuntimeState() {
      return execCommand("sh " + SCRIPT_BASE + "/read_state.sh").then(function(result) {
        if (result.errno !== 0) {
          throw new Error(result.stderr || result.stdout || "读取状态失败");
        }
        applyState(parseKeyValue(result.stdout));
      });
    }

    function renderApps() {
      const keyword = String(appState.filter || "").toLowerCase();
      let html = "";
      let visibleCount = 0;
      let i;
      for (i = 0; i < appState.apps.length; i += 1) {
        const pkg = appState.apps[i].packageName;
        if (keyword && pkg.toLowerCase().indexOf(keyword) === -1) {
          continue;
        }
        visibleCount += 1;
        html += '<label class="app-item"><input type="checkbox" data-pkg="' + pkg + '"' +
          (appState.selectedMap[pkg] ? " checked" : "") +
          "> " + escapeHtml(appState.apps[i].appLabel || pkg) +
          '<br><span class="muted">' + escapeHtml(pkg) + "</span></label>";
      }

      if (!visibleCount) {
        els.appsList.innerHTML = "没有匹配到任何第三方应用。";
        return;
      }

      els.appsList.innerHTML = html;
      bindAppCheckboxes();
    }

    function bindAppCheckboxes() {
      const inputs = els.appsList.querySelectorAll("input[type=checkbox]");
      let i;
      for (i = 0; i < inputs.length; i += 1) {
        inputs[i].onchange = function() {
          const pkg = this.getAttribute("data-pkg");
          if (this.checked) {
            appState.selectedMap[pkg] = true;
          } else {
            delete appState.selectedMap[pkg];
          }
          syncTextareaFromSelection();
        };
      }
    }

    function syncTextareaFromSelection() {
      const list = parsePackages(els.manualPackages.value);
      const merged = {};
      const output = [];
      let i;

      for (i = 0; i < list.length; i += 1) {
        merged[list[i]] = true;
      }

      for (i = 0; i < appState.apps.length; i += 1) {
        const pkg = appState.apps[i].packageName;
        if (appState.selectedMap[pkg]) {
          merged[pkg] = true;
        }
      }

      for (const key in merged) {
        if (Object.prototype.hasOwnProperty.call(merged, key)) {
          output.push(key);
        }
      }

      output.sort();
      els.manualPackages.value = output.join("\n");
    }

    function loadApps() {
      setBusy(true);
      setNotice("");

      return readConfig().then(function() {
        const packages = listPackages("user");
        if (!packages || !packages.length) {
          throw new Error("KernelSU 未返回第三方应用列表");
        }

        const packageInfos = getPackagesInfo(packages)
          .filter(function(item) {
            return item && item.packageName && !item.isSystem;
          })
          .sort(function(a, b) {
            const labelA = String(a.appLabel || a.packageName);
            const labelB = String(b.appLabel || b.packageName);
            return labelA.localeCompare(labelB, "zh-CN");
          });

        appState.apps = packageInfos;
        renderApps();
        syncTextareaFromSelection();
        setNotice("第三方应用列表加载完成，共 " + packageInfos.length + " 个。", false);
      }).catch(function(error) {
        setNotice(error.message || String(error), true);
      }).then(function() {
        setBusy(false);
      });
    }

    function readConfig() {
      return execCommand("sh " + SCRIPT_BASE + "/read_config.sh").then(function(result) {
        if (result.errno !== 0) {
          throw new Error(result.stderr || result.stdout || "读取配置失败");
        }
        const packages = parsePackages(result.stdout);
        let i;
        appState.selectedMap = {};
        for (i = 0; i < packages.length; i += 1) {
          appState.selectedMap[packages[i]] = true;
        }
        els.manualPackages.value = packages.join("\n");
        renderApps();
      });
    }

    function savePackages() {
      setBusy(true);
      setNotice("");

      const packages = parsePackages(els.manualPackages.value);
      const payload = btoa(unescape(encodeURIComponent(packages.join("\n"))));

      return execCommand("sh " + SCRIPT_BASE + "/save_config.sh " + shellQuote(payload)).then(function(result) {
        if (result.errno !== 0) {
          throw new Error(result.stderr || result.stdout || "保存失败");
        }
        setNotice((result.stdout || "保存完成").replace(/^\s+|\s+$/g, ""), false);
        return readConfig();
      }).catch(function(error) {
        setNotice(error.message || String(error), true);
      }).then(function() {
        setBusy(false);
      });
    }

    function setDebug(enabled) {
      setBusy(true);
      setNotice("");

      return execCommand("sh " + SCRIPT_BASE + "/set_debug.sh " + (enabled ? "1" : "0")).then(function(result) {
        if (result.errno !== 0) {
          throw new Error(result.stderr || result.stdout || "设置调试日志失败");
        }
        setNotice((result.stdout || "设置完成").replace(/^\s+|\s+$/g, ""), false);
        return loadRuntimeState();
      }).catch(function(error) {
        setNotice(error.message || String(error), true);
      }).then(function() {
        setBusy(false);
      });
    }

    function saveRefreshInterval() {
      setBusy(true);
      setNotice("");

      const interval = normalizeInterval(els.refreshIntervalInput.value);
      els.refreshIntervalInput.value = String(interval);

      return execCommand("sh " + SCRIPT_BASE + "/set_refresh_interval.sh " + interval).then(function(result) {
        if (result.errno !== 0) {
          throw new Error(result.stderr || result.stdout || "保存刷新间隔失败");
        }
        appState.refreshInterval = interval;
        restartTimer();
        setNotice((result.stdout || "保存完成").replace(/^\s+|\s+$/g, ""), false);
      }).catch(function(error) {
        setNotice(error.message || String(error), true);
      }).then(function() {
        setBusy(false);
      });
    }

    function readLog() {
      return execCommand("sh " + SCRIPT_BASE + "/read_log.sh").then(function(result) {
        if (result.errno !== 0) {
          throw new Error(result.stderr || result.stdout || "读取日志失败");
        }
        els.logView.textContent = result.stdout || "日志为空。";
      }).catch(function(error) {
        setNotice(error.message || String(error), true);
      });
    }

    function clearLog() {
      setBusy(true);
      setNotice("");

      return execCommand("sh " + SCRIPT_BASE + "/clear_log.sh").then(function(result) {
        if (result.errno !== 0) {
          throw new Error(result.stderr || result.stdout || "清空日志失败");
        }
        els.logView.textContent = "日志已清空。";
        setNotice((result.stdout || "日志已清空").replace(/^\s+|\s+$/g, ""), false);
      }).catch(function(error) {
        setNotice(error.message || String(error), true);
      }).then(function() {
        setBusy(false);
      });
    }

    function restartTimer() {
      if (appState.timerId) {
        clearInterval(appState.timerId);
      }
      appState.timerId = setInterval(function() {
        loadRuntimeState();
      }, appState.refreshInterval * 1000);
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    els.searchInput.oninput = function() {
      appState.filter = els.searchInput.value;
      renderApps();
    };
    els.saveBtn.onclick = savePackages;
    els.reloadBtn.onclick = function() {
      setBusy(true);
      setNotice("");
      Promise.all([loadRuntimeState(), readConfig()]).catch(function(error) {
        setNotice(error.message || String(error), true);
      }).then(function() {
        setBusy(false);
      });
    };
    els.refreshStateBtn.onclick = function() {
      setBusy(true);
      setNotice("");
      loadRuntimeState().catch(function(error) {
        setNotice(error.message || String(error), true);
      }).then(function() {
        setBusy(false);
      });
    };
    els.loadAppsBtn.onclick = loadApps;
    els.readLogBtn.onclick = readLog;
    els.clearLogBtn.onclick = clearLog;
    els.debugToggle.onchange = function() {
      setDebug(els.debugToggle.checked);
    };
    els.saveRefreshBtn.onclick = saveRefreshInterval;

    setNotice("WebUI 已按 KernelSU 官方 API 模式加载，正在读取状态...", false);
    Promise.all([loadRuntimeState(), readConfig()]).then(function() {
      setNotice("WebUI 已就绪。", false);
      toast("欧加真智能调光 WebUI 已就绪");
    }).catch(function(error) {
      setNotice(error.message || String(error), true);
    });
  </script>
</body>
</html>
